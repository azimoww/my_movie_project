<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>

<h2>Movies</h2>

<table border="100">
  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Genre</th>
    <th>Rating</th>
    <th>Release Date</th>
  </tr>

  <tr th:each="movie : ${movies}">
    <td th:text="${movie.id}"></td>
    <td th:text="${movie.title}"></td>
    <td th:text="${movie.genre}"></td>
    <td th:text="${movie.rating}"></td>
    <td th:text="${movie.releaseDate}"></td>
  </tr>
</table>

</body>
</html>
